<svg xmlns="http://www.w3.org/2000/svg" width="460" height="460" viewBox="0 0 460 460">
  <g fill="#ebebec" fill-opacity="0.05" font-family="Georgia, 'Times New Roman', 'Songti SC', serif">
    <text x="28" y="64" font-size="24" transform="rotate(-7 28 64)">e^iπ + 1 = 0</text>
    <text x="250" y="52" font-size="20" transform="rotate(5 250 52)">a² + b² = c²</text>
    <text x="70" y="150" font-size="21" transform="rotate(4 70 150)">∑ k = n(n+1)/2</text>
    <text x="280" y="170" font-size="19" transform="rotate(-5 280 170)">sin²θ + cos²θ = 1</text>
    <text x="40" y="250" font-size="20" transform="rotate(-4 40 250)">∫ f(x) dx = F(b) − F(a)</text>
    <text x="300" y="270" font-size="22" transform="rotate(6 300 270)">φ = (1+√5)/2</text>
    <text x="90" y="350" font-size="19" transform="rotate(3 90 350)">x = (−b ± √Δ) / 2a</text>
    <text x="270" y="380" font-size="20" transform="rotate(-6 270 380)">lim (1 + 1/n)ⁿ = e</text>
    <text x="180" y="440" font-size="21" transform="rotate(2 180 440)">π ≈ 3.14159…</text>
  </g>
</svg>
